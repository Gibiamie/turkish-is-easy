<style>

ht:700;line-height:1.4;margin-top:4px}.more{margin-top:8px;border-top:1px dashed #cbd5e1;padding-top:8px;display:none}.more.open{display:block}.big-word{text-align:center;font-size:44px;font-weight:950;color:var(--primary);letter-spacing:-.04em;margin:10px 0}.meaning{text-align:center;font-size:18px;font-weight:950;color:#334155;margin:8px 0}.alphabet-example{text-align:center;font-size:18px;font-weight:750;color:#334155;margin:8px 0;letter-spacing:0;font-variant-ligatures:normal}.alphabet-example .tr-word{font-weight:750;color:#1f2937}.alphabet-example .translation{font-weight:650;color:#475569}.visual{width:104px;height:104px;margin:8px auto;border-radius:28px;background:linear-gradient(135deg,#f8fafc,#eff6ff);border:1px solid #dbeafe;display:grid;place-items:center;font-size:58px}.root-card{text-align:center}.answer-box{min-height:58px;border:2px dashed #cbd5e1;border-radius:18px;display:flex;align-items:center;justify-content:center;text-align:center;padding:8px;margin:10px 0;font-size:25px;font-weight:950;color:var(--primary);background:#f8fafc}.word-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px}.word-chip{min-height:44px;border-radius:14px;border:1px solid #cbd5e1;background:#fff;color:#0f172a;font-size:18px;font-weight:950;box-shadow:0 4px 12px rgba(15,23,42,.04)}.word-chip.root{background:#ecfeff;border-color:#67e8f9}.word-chip.suffix{background:#fff7ed;border-color:#fdba74}.word-chip.distractor{background:#f8fafc;color:#64748b}.word-chip.selected{background:#2563eb;color:#fff;border-color:#2563eb}.feedback{border-radius:16px;padding:11px;margin-top:10px;background:#f1f5f9;color:#334155;text-align:center;font-size:13px;font-weight:900;line-height:1.35}.feedback.good{background:#dcfce7;color:#166534}.feedback.bad{background:#fee2e2;color:#991b1b}.rule-reveal{display:none;margin-top:10px;background:#f0fdf4;border:1px solid #bbf7d0;color:#14532d;padding:10px;border-radius:15px;font-size:13px;font-weight:800;line-height:1.45}.rule- /* Professional root-word image system: image first, emoji second, text fallback third */
.rw-visual{
  width:92px;
  height:92px;
  border-radius:24px;
  display:flex;
  align-items:center;
  justify-content:center;
  margin:8px auto 12px;
  background:linear-gradient(180deg,#ffffff 0%,#f8fafc 100%);
  border:1px solid #dbe4f0;
  box-shadow:0 6px 18px rgba(15,23,42,.08);
  overflow:hidden;
  position:relative;
}
.rw-visual.compact{
  width:52px;
  height:52px;
  border-radius:16px;
  margin:0;
}
.rw-visual-img{width:100%;height:100%;object-fit:cover;display:block;background:transparent}
.rw-visual-emoji{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:40px;line-height:1}
.rw-visual.compact .rw-visual-emoji{font-size:28px}
.rw-visual-text{width:100%;height:100%;display:flex;align-items:center;justify-content:center;padding:8px;text-align:center;font-size:13px;font-weight:950;color:#334155;letter-spacing:.08em;line-height:1.05}
.rw-visual.compact .rw-visual-text{font-size:10px;padding:5px}
.root-card{padding:18px 14px}
.root-media{display:flex;align-items:center;justify-content:center;gap:14px;margin:4px 0 10px}
.root-copy{text-align:left}.root-copy .big-word{font-size:34px;text-align:left;margin:0;color:#2563eb}.root-copy .meaning{text-align:left;margin:3px 0 0;font-size:15px}
.topic-visual-row .rw-visual{box-shadow:none;background:#fff;border-color:#e2e8f0}

@media(max-width:380px){.app{padding:10px}.word-grid{grid-template-columns:repeat(2,1fr)}.big-word{font-size:38px}.visual{width:90px;height:90px;font-size:48px}.laya{width:54px;height:54px}.lesson-title{font-size:16px}.btn{font-size:13px}.grid3{grid-template-columns:1fr 1fr 1fr;gap:6px}.stat{padding:8px 4px}}

  <header class="header"><div class="brand-row"><div class="logo">🧩</div><div><h1>Turkish Meaning Builder</h1><div id="subtitle" class="subtitle"></div></div></div></header>

  <section id="startPage" class="card">
    <div class="prompt" id="chooseTitle">Choose learner</div>
    <div class="grid2">
      <button class="profile-card bella" id="chooseBella"><strong>Bella</strong><span>English interface</span></button>
      <button class="profile-card ayza" id="chooseAyza"><strong>Ayza</strong><span>Bahasa Indonesia</span></button>
    </div>
    <div id="styleArea" class="hidden"><div class="prompt" id="styleTitle"></div><div id="styleList"></div><button class="btn btn-primary" style="width:100%;margin-top:10px" id="continueBtn"></button></div>
  </section>

  <section id="homePage" class="hidden">
    <div class="card">
      <div class="row"><button class="btn btn-ghost btn-compact" id="changeBtn"></button><button class="btn btn-danger btn-compact" id="resetBtn"></button></div>
      <div class="prompt" id="homeTitle"></div>
      <div class="screen-note" id="homeNote"></div>
      <div class="grid3" style="margin-top:12px">
        <div class="stat"><strong id="score">0</strong><small id="scoreLabel"></small></div>
        <div class="stat"><strong id="attempts">0</strong><small id="practiceLabel"></small></div>
        <div class="stat"><strong id="accuracy">0%</strong><small id="accuracyLabel"></small></div>
      </div>
      <div style="margin-top:10px"><div class="progress"><div id="totalBar"></div></div></div>
    </div>
    <div class="card"><div class="prompt" id="pathTitle"></div><div id="pathBox"></div></div>
  </section>

  <section id="lessonPage" class="hidden">
    <div class="card">
      <div class="lesson-nav"><button class="btn btn-ghost btn-compact" id="prevBtn"></button><div class="lesson-title" id="lessonTitle"></div><button class="btn btn-ghost btn-compact" id="menuBtn"></button></div>
      <div class="counter" id="counter"></div>
      <div class="lesson-progress-label"><span id="pageProgressText"></span><span id="completeProgressText"></span></div><div class="progress"><div id="lessonBar"></div></div>
      <div id="activity"></div>
      <div class="bottom-actions"><div class="row"><button class="btn btn-ghost" id="prevBtn2"></button><button class="btn btn-primary" id="nextBtn"></button></div></div>
    </div>
  </section>
</div>

}

function toggleMore(btn){const m=btn.nextElementSibling;m.classList.toggle('open');btn.textContent=m.classList.contains('open')?T('hideTip'):T('showTip')}
function renderAlphabet(){const item=ALPHABET[index];$('activity').innerHTML=layaBlock(T('topicIntro'), lang()==='id'?'Dengarkan bunyi utama, lalu contoh dan perbandingan.':'Listen to the main sound, then the example and contrast sound.', text(item.tip))+`<div class="big-word">${item.letter}</div><div class="alphabet-example"><span class="tr-word">${item.example.label}</span> <span class="translation">= ${text(item.example.meaning)}</span></div><div class="row"><button class="btn btn-audio" data-label="${T('listenMain')}: ${item.main.label}" onclick="playFile('${item.main.audio}',this)">${T('listenMain')}: ${item.main.label}</button><button class="btn btn-audio" data-label="${T('listenExample')}: ${item.example.label}" onclick="playFile('${item.example.audio}',this)">${T('listenExample')}: ${item.example.label}</button></div><div class="row" style="margin-top:8px"><button class="btn btn-audio" data-label="${T('listenContrast')}: ${item.contrast.label}" onclick="playFile('${item.contrast.audio}',this)">${T('listenContrast')}: ${item.contrast.label}</button><button class="btn btn-success" onclick="markDone('alphabet','${item.id}',false);renderLesson();">${T('know')}</button></div><div id="fb" class="feedback">${text(item.tip)}</div>`}
function renderRoot(){const item=ROOTS[index];$('activity').innerHTML=layaBlock(T('topicIntro'), lang()==='id'?'Ini kata dasar. Nanti akhiran akan menambah makna baru.':'This is a root word. Later, suffixes will add meaning to it.', lang()==='id'?'Dengar kata Turki dan hubungkan dengan gambar, bukan hanya terjemahan.':'Listen to the Turkish word and connect it with the image, not only the translation.')+`<div class="root-card"><div class="root-media">${renderWordVisual(item.word)}<div class="root-copy"><div class="big-word">${item.word}</div><div class="meaning">${text(item.meaning)}</div></div></div><button class="btn btn-audio" data-label="${T('listenRoot')}" onclick="playFile('${item.audio}',this)">${T('listenRoot')}</button><button class="btn btn-success" style="margin-top:8px;width:100%" onclick="markDone('root','${item.id}',false);renderLesson();">${T('know')}</button></div><div id="fb" class="feedback">${T('rootDesc')}</div>`}
function shuffle(arr){return [...arr].sort(()=>Math.random()-.5)}
function renderBuilder(){const item=lessonList()[index];selected=[];const shuffled=shuffle(item.cards);const intro={meaning:[lang()==='id'?'Akhiran menambah makna. Susun bagian kata tanpa melihat jawaban.':'Suffixes add meaning. Build the word without seeing the answer first.',lang()==='id'?'Contoh logika: akar + kepunyaan + tempat. Urutan penting.':'Logic example: root + possession + location. Order matters.'],plural:[lang()==='id'?'Bahasa Turki memakai -ler atau -lar untuk jamak.':'Turkish uses -ler or -lar for plural words.',lang()==='id'?'Pilih akhiran jamak yang cocok dengan bunyi kata.':'Choose the plural suffix that fits the word sound.'],accusative:[lang()==='id'?'Objek tertentu memakai akhiran khusus.':'A specific object can take a special object suffix.',lang()==='id'?'Jika kata berakhir vokal, huruf y bisa muncul sebagai penyambung.':'If the word ends with a vowel, buffer y can appear.']}[lesson];$('activity').innerHTML=layaBlock(T('topicIntro'),intro[0],intro[1])+`<div class="meaning">${text(item.prompt)}</div><div class="topic-visual-row">${renderWordVisual(firstRootForVisual(item),true)}</div><div id="answerBox" class="answer-box">${T('tap')}</div><div class="word-grid" id="wordGrid"></div><div class="row" style="margin-top:10px"><button class="btn btn-clear" onclick="renderBuilder()">${T('clear')}</button><button class="btn btn-primary" onclick="checkBuilder()">${T('check')}</button></div><div id="fb" class="feedback">${T('tap')}</div><div id="rule" class="rule-reveal"></div>`;const grid=$('wordGrid');shuffled.forEach((c,i)=>{const b=document.createElement('button');b.className='word-chip '+c[1];b.textContent=c[0];b.onclick=()=>pickPart(b,c[0]);grid.appendChild(b)});}
function pickPart(btn,label){if(btn.disabled)return;btn.disabled=true;btn.classList.add('selected');selected.push(label);$('answerBox').textContent=selected.join(' + ')}
function checkBuilder(){const item=lessonList()[index];const ok=selected.length===item.seq.length&&selected.every((v,i)=>v===item.seq[i]);attempt(ok);if(ok){markDone(lesson,item.id,false);setFeedback(T('correct'),true);$('answerBox').textContent=item.result;$('rule').innerHTML=`<strong>${item.result}</strong><br>${text(item.rule)}<br><span class="small">${item.explain}</span><div style="margin-top:8px"><button class="btn btn-audio btn-compact" data-label="${T('listenSound')}" onclick="playResult(lessonList()[index],this)">${T('listenSound')}</button></div>`;$('rule').classList.add('show')}else{setFeedback(T('wrong'),false)}}
function setFeedback(msg,good){const fb=$('fb');if(!fb)return;fb.textContent=msg;fb.className='feedback '+(good===true?'good':good===false?'bad':'')}
function resetProgress(){store={stats:{score:0,attempts:0},done:{bella:{alphabet:[],root:[],meaning:[],plural:[],accusative:[]},ayza:{alphabet:[],root:[],meaning:[],plural:[],accusative:[]}}};save();showHome()}
$('chooseBella').onclick=()=>chooseLearner('bella');$('chooseAyza').onclick=()=>chooseLearner('ayza');$('continueBtn').onclick=showHome;$('changeBtn').onclick=showStart;$('resetBtn').onclick=resetProgress;$('prevBtn').onclick=prevItem;$('prevBtn2').onclick=prevItem;$('menuBtn').onclick=showHome;$('nextBtn').onclick=nextItem;
window.setStyle=setStyle;window.openLesson=openLesson;window.playFile=playFile;window.markDone=markDone;window.renderLesson=renderLesson;window.pickPart=pickPart;window.checkBuilder=checkBuilder;window.renderBuilder=renderBuilder;window.playResult=playResult;window.toggleMore=toggleMore;
renderStart(); if(learner&&style)showHome();
</script>
</body>
</html>
