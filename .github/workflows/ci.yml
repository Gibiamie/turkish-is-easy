name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Syntax-check all modules
        run: |
          for f in js/*.js sw.js tests/*.mjs; do
            node --check "$f"
          done
      - name: Data integrity
        run: node tests/data-integrity.mjs
